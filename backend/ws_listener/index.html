<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>WebSocket Listener</title>
    <script>
        let socket = null;
        let currentSymbol = null;
        let currentTimeframe = null;

        function sendMessageToStreamlit(value) {
            window.parent.postMessage({
                isStreamlitMessage: true,
                type: "streamlit:setComponentValue",
                value: value
            }, "*");
        }

        function connectWebSocket(symbol, timeframe, sessionId) {
            if (socket) {
                if (currentSymbol === symbol && currentTimeframe === timeframe) {
                    return; // already connected to correct session
                }
                socket.close();
            }

            let wsHost = "127.0.0.1";
            try {
                wsHost = window.parent.location.hostname || window.location.hostname || "127.0.0.1";
            } catch (e) {
                wsHost = window.location.hostname || "127.0.0.1";
            }

            const wsUrl = `ws://${wsHost}:8505/ws?symbol=${encodeURIComponent(symbol)}&timeframe=${encodeURIComponent(timeframe)}&session_id=${encodeURIComponent(sessionId)}`;
            socket = new WebSocket(wsUrl);

            currentSymbol = symbol;
            currentTimeframe = timeframe;

            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.timestamp) {
                        sendMessageToStreamlit(data.timestamp);
                    }
                } catch (e) {
                    console.error("Error parsing WebSocket message:", e);
                }
            };

            socket.onclose = function() {
                console.log("WebSocket listener closed");
            };

            socket.onerror = function(error) {
                console.error("WebSocket listener error:", error);
            };
        }

        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                const args = event.data.args;
                const symbol = args.symbol;
                const timeframe = args.timeframe;
                const sessionId = args.session_id;
                
                if (symbol && timeframe) {
                    connectWebSocket(symbol, timeframe, sessionId);
                }
                
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setFrameHeight",
                    height: 0
                }, "*");
            }
        });

        // Notify Streamlit that the component is ready to receive render requests
        window.parent.postMessage({
            isStreamlitMessage: true,
            type: "streamlit:componentReady",
            apiVersion: 1
        }, "*");
    </script>
</head>
<body style="margin: 0; padding: 0; background: transparent; overflow: hidden; height: 0; width: 0;">
</body>
</html>
